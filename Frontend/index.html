<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapRecipe</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>SnapRecipe</h2>
    <p class="subtitle">Upload a photo to identify dishes instantly</p>

    <div class="upload-container">
        <span class="upload-icon">📸</span>
        <span id="file-text">Click or Drag Image</span>
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <img id="preview" />
    </div>

    <button id="uploadBtn" onclick="uploadImage(event)">
        <span class="spinner" id="btnSpinner"></span>
        <span id="btnText">Generate Recipe</span>
    </button>

    <div id="result">
        <small class="result-title">Analysis Complete</small>
        <div id="foodName"></div>
    </div>
</div>

<!-- External JS -->
<script src="script.js"></script>

</body>
</html>
